name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint and Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/kodaore?schema=public
      NEXTAUTH_SECRET: CI_ONLY_NEXTAUTH_SECRET_MIN_32_CHARACTERS
      NEXTAUTH_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kodaore
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kodaore"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/kodaore?schema=public
      NEXTAUTH_SECRET: CI_ONLY_NEXTAUTH_SECRET_MIN_32_CHARACTERS
      NEXTAUTH_URL: http://127.0.0.1:3000
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      E2E_AUTH_ENABLED: "true"
      E2E_FAMILY_IDENTIFIER: familia@kodaore.eus
      E2E_MANAGEMENT_IDENTIFIER: developer
      E2E_PASSWORD: Kodaore2026!
      SEED_DEFAULT_PASSWORD: Kodaore2026!
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npm run db:migrate:deploy

      - name: Seed database
        run: npm run db:seed

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
